name: mpc-qt
base: core24
version: '26.01'
platforms:
  amd64:
    build-on: [amd64]
    build-for: [amd64]
  arm64:
    build-on: [arm64]
    build-for: [arm64]
summary: Media Player Classic reimplemented with Qt and libmpv
description: |
   Open source media player focusing on ease of use and effectiveness.

    Features:

    Multiple playlists
    Video preview on seekbar (thumbnail)
    Quick queueing like xmms/qmmp
    Play online videos (with youtube-dl)
    Configurable shortcuts and mouse buttons
    Multimedia keys support (Mpris)
    Web interface
    Thumbnails maker

grade: stable
confinement: strict
icon: mpc-qt.svg

apps:
  mpc-qt:
    command: usr/bin/mpc-qt
    desktop: usr/share/applications/io.github.mpc_qt.mpc-qt.desktop
    common-id: io.github.mpc_qt.mpc-qt
    extensions: [kde-neon-6]
    environment:
      QT_QPA_PLATFORMTHEME: xdgdesktopportal
      PYTHONPATH: $SNAP/usr/lib/python3/dist-packages:$PYTHONPATH
      LD_LIBRARY_PATH: $SNAP/lxqt-support/usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR:$LD_LIBRARY_PATH
      QT_PLUGIN_PATH: $SNAP/lxqt-support/usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/qt6/plugins:$QT_PLUGIN_PATH
    plugs:
      - screen-inhibit-control
      - home
      - removable-media
      - mount-observe
    slots:
      - mpris

plugs:
  shared-memory:
    private: true

package-repositories:
  - type: apt
    url: https://ppa.launchpadcontent.net/ubuntuhandbook1/mpv/ubuntu
    suites: [noble]
    components: [main]
    architectures: [amd64, arm64]
    key-id: F4E48910A020E77056748B745738AE8480447DDF
  - type: apt
    url: https://ppa.launchpadcontent.net/tomtomtom/yt-dlp/ubuntu
    suites: [noble]
    components: [main]
    architectures: [amd64, arm64]
    key-id: CEC312CC5ED8215A6E0EFC49B90E9186F0E836FB

parts:
  mpc-qt-app:
    plugin: cmake
    source: https://github.com/mpc-qt/mpc-qt.git
    source-tag: v$SNAPCRAFT_PROJECT_VERSION
    build-packages:
      - libmpv-dev
      - libboost-dev
      - libproxy-dev
    cmake-parameters:
      - -DCMAKE_INSTALL_PREFIX=/usr
      - -DMPCQT_VERSION=$SNAPCRAFT_PROJECT_VERSION-Snap-Kyu
      - -DCMAKE_BUILD_TYPE=RelWithDebInfo
    override-build: |
      craftctl default
      sed -i 's|Name=Media Player Classic Qute Theater|Name=MPC-QT [Kyu]|' $CRAFT_PART_INSTALL/usr/share/applications/io.github.mpc_qt.mpc-qt.desktop

  dependencies:
    after: [mpc-qt-app]
    plugin: nil
    stage-packages:
      - libsdl2-2.0-0
      - libxpresent1
      - libxv1
      - libavdevice60
      - libavfilter9
      - libbs2b0
      - libcdio19t64
      - libcdio-cdda2t64
      - libcdio-paranoia2t64
      - libdecor-0-0
      - libfftw3-double3
      - libflite1
      - libjack0
      - liblilv-0-0
      - libmpv2
      - libmujs3
      - libplacebo338
      - libpocketsphinx3
      - librubberband2
      - libserd-0-0
      - libsixel1
      - libsord-0-0
      - libsphinxbase3t64
      - libsratom-0-0
      - libuchardet0
      - libvidstab1.1
      - libzimg2
      - libzix-0-0
      - libglut3.12
      - yt-dlp
    prime:
      - usr/lib
      - usr/bin
